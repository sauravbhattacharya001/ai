codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        flags:
          - unittests
    patch:
      default:
        target: 80%
        threshold: 5%

flags:
  unittests:
    paths:
      - src/replication/
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  after_n_builds: 1
