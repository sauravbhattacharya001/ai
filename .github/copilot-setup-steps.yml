name: Copilot Setup Steps
description: Install dependencies and build the project for GitHub Copilot coding agents

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify package installation
        run: |
          python -c "from replication import Controller, Worker, ReplicationContract; print('core imports OK')"
          python -c "from replication.alignment import AlignmentAuditor; print('alignment OK')"
          python -c "from replication.forensics import ForensicsEngine; print('forensics OK')"
          python -c "from replication.fleet import FleetManager; print('fleet OK')"
          python -c "from replication.supply_chain import SupplyChainAnalyzer; print('supply_chain OK')"
          python -c "from replication.drift import DriftTracker; print('drift OK')"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Type check
        run: python -m mypy src/replication/ --ignore-missing-imports || true

      - name: Lint
        run: python -m flake8 src/replication/ --max-line-length=120 --count --show-source --statistics || true
