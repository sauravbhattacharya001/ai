name: Stale Issues & PRs

on:
  schedule:
    - cron: '30 2 * * *'   # daily at 02:30 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further
            activity occurs. If this is still relevant, please comment or remove
            the stale label.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with no
            activity. Feel free to reopen if it's still relevant.
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          exempt-issue-labels: 'pinned,security,good first issue,help wanted'

          # Pull Requests
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed in 14 days if no
            further activity occurs. If this is still in progress, please push
            a commit or comment to keep it open.
          close-pr-message: >
            This pull request was closed because it has been stale for 14 days
            with no activity. Feel free to reopen if work continues.
          days-before-pr-stale: 45
          days-before-pr-close: 14
          stale-pr-label: stale
          exempt-pr-labels: 'pinned,work-in-progress'

          # Limits
          operations-per-run: 60
          ascending: true
