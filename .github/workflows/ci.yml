name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: pip install flake8 mypy

      - name: Flake8
        run: flake8 src/ tests/ --max-line-length 120 --extend-ignore E501

      - name: Mypy (informational)
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=replication \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-report=json:coverage.json

      - name: Coverage threshold check
        if: matrix.python-version == '3.12'
        run: |
          TOTAL=$(python -c "import json; d=json.load(open('coverage.json')); print(d['totals']['percent_covered_display'])")
          echo "### 🔬 Coverage: ${TOTAL}%" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json, sys
          d = json.load(open('coverage.json'))
          pct = d['totals']['percent_covered']
          print(f'Total coverage: {pct:.1f}%')
          # Per-file breakdown for uncovered files
          for fname, fdata in sorted(d['files'].items()):
            fpct = fdata['summary']['percent_covered']
            if fpct < 80:
              missing = fdata['summary']['missing_lines']
              print(f'  ⚠ {fname}: {fpct:.0f}% ({missing} lines uncovered)')
          if pct < 80:
            print(f'::warning::Coverage {pct:.1f}% is below 80% threshold')
          "

      - name: Upload coverage HTML report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
